name: Publish JARs And Docker Images

on:
  push:
    tags:
      - 'v*'
      - 'publish-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update, for example v1.0.0
        required: true
        type: string
      publish_jars:
        description: Upload service JAR files to the GitHub release
        required: true
        default: true
        type: boolean
      publish_docker_images:
        description: Build and publish Docker images to GitHub Container Registry
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '17'
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
  PUBLISH_JARS: ${{ github.event_name == 'push' || inputs.publish_jars }}
  PUBLISH_DOCKER_IMAGES: ${{ github.event_name == 'push' || inputs.publish_docker_images }}
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/cicd-demo

jobs:
  ensure-tag:
    name: Ensure Release Tag Exists
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: release
        run: echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Tag When Dispatched Manually
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

  build-jars:
    name: Build JARs
    runs-on: ubuntu-latest
    needs: ensure-tag
    if: env.PUBLISH_JARS == 'true'
    strategy:
      matrix:
        service: [user-service, order-service, inventory-service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ./apps/microservices/${{ matrix.service }}
        run: mvn -B -ntp clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.service }}
          path: |
            apps/microservices/${{ matrix.service }}/target/*.jar
            !apps/microservices/${{ matrix.service }}/target/*.jar.original

  publish-jars:
    name: Publish JAR Release Assets
    runs-on: ubuntu-latest
    needs: [ensure-tag, build-jars]
    if: env.PUBLISH_JARS == 'true'
    steps:
      - name: Download JAR Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: jars-*
          merge-multiple: true

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.ensure-tag.outputs.release_tag }}
          name: ${{ needs.ensure-tag.outputs.release_tag }}
          files: release-assets/*.jar
          fail_on_unmatched_files: true

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: ensure-tag
    if: env.PUBLISH_DOCKER_IMAGES == 'true'
    strategy:
      matrix:
        service: [user-service, order-service, inventory-service]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.ensure-tag.outputs.release_tag }}
            type=sha,prefix=git-

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./apps/microservices/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max