name: CI / CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: CodeQL Action
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Build
        run: npm install

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v2

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3

    permissions:
      contents: read
      security-events: write

  build:
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build
        run: npm install && npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy
        run: echo 'Deploying...'