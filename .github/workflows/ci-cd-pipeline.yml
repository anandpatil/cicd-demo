name: CI / CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true  # Kill switch: pipeline continues even if CodeQL service is unavailable

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CodeQL Action
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Install dependencies
        run: npm install

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v3
        continue-on-error: true  # Kill switch: CodeQL analysis may be unavailable

  build:
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: npm install && npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: echo 'Deploying...'