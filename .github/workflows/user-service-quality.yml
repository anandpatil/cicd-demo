name: User Service Quality Gates

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths:
      - 'apps/microservices/user-service/**'
      - '.github/workflows/user-service-quality.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/microservices/user-service/**'
      - '.github/workflows/user-service-quality.yml'
  workflow_dispatch:

jobs:
  test-and-coverage:
    name: Unit Tests + Coverage Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests and JaCoCo Check
        working-directory: apps/microservices/user-service
        run: mvn -B clean verify

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-service-coverage
          path: |
            apps/microservices/user-service/target/site/jacoco/
            apps/microservices/user-service/target/surefire-reports/

  sonar-quality-gate:
    name: Sonar Quality Gate
    runs-on: ubuntu-latest
    needs: test-and-coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Sonar Scan (User Service)
        working-directory: apps/microservices/user-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B verify sonar:sonar
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.qualitygate.wait=true

  codeql:
    name: CodeQL (Java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build User Service
        working-directory: apps/microservices/user-service
        run: mvn -B clean package -DskipTests=true

      - name: Analyze
        uses: github/codeql-action/analyze@v3
